spring.datasource.url=jdbc:mysql://localhost:3306/e_commerce
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

server.port=8080

# JWT configuration (used by com.ecommerce.security.JwtUtils)
# Change `ecommerce.app.jwtSecret` to a secure random string (at least 32 characters)
ecommerce.app.jwtSecret=replace_with_a_secure_random_string_at_least_32_chars_long
# Expiration time in milliseconds (example: 86400000 = 24 hours)
ecommerce.app.jwtExpirationMs=86400000