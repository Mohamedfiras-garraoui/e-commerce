<div
  class="signup-container"
  style="
    max-width: 480px;
    margin: 60px auto;
    padding: 28px;
    border: 1px solid #e6e6e6;
    border-radius: 8px;
    font-family: sans-serif;
  "
>
  <h2 style="text-align: center; color: #333; margin-bottom: 18px">
    Créer un compte
  </h2>

  <div
    *ngIf="errorMessage"
    style="
      color: #721c24;
      background: #f8d7da;
      border: 1px solid #f5c6cb;
      padding: 10px;
      border-radius: 4px;
      margin-bottom: 12px;
    "
  >
    {{ errorMessage }}
  </div>

  <form (ngSubmit)="onSubmit()">
    <div style="display: flex; gap: 12px; margin-bottom: 12px">
      <input
        name="firstname"
        [(ngModel)]="form.firstname"
        placeholder="Prénom"
        required
        style="
          flex: 1;
          padding: 10px;
          border: 1px solid #ccc;
          border-radius: 4px;
        "
      />
      <input
        name="lastname"
        [(ngModel)]="form.lastname"
        placeholder="Nom"
        required
        style="
          flex: 1;
          padding: 10px;
          border: 1px solid #ccc;
          border-radius: 4px;
        "
      />
    </div>

    <div style="margin-bottom: 12px">
      <input
        name="email"
        type="email"
        [(ngModel)]="form.email"
        placeholder="Email"
        required
        style="
          width: 100%;
          padding: 10px;
          border: 1px solid #ccc;
          border-radius: 4px;
        "
      />
    </div>

    <div style="margin-bottom: 18px">
      <input
        name="password"
        type="password"
        [(ngModel)]="form.password"
        placeholder="Mot de passe"
        required
        style="
          width: 100%;
          padding: 10px;
          border: 1px solid #ccc;
          border-radius: 4px;
        "
      />
    </div>

    <button
      type="submit"
      style="
        width: 100%;
        padding: 12px;
        background: #28a745;
        color: #fff;
        border: none;
        border-radius: 4px;
        font-weight: 600;
      "
    >
      S'inscrire
    </button>
  </form>

  <p style="text-align: center; margin-top: 12px; font-size: 14px; color: #555">
    Déjà un compte? <a routerLink="/login">Connexion</a>
  </p>
</div>
